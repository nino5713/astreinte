{% extends "base.html" %}
{% set page = 'planning' %}
{% block titre %}Planning · SOCOM Astreinte{% endblock %}
{% block contenu %}
<div class="contenu">
  <div class="semaine-nav">
    <button class="btn" id="mois-prec">‹</button>
    <div class="titre" id="mois-titre" style="text-transform:capitalize">…</div>
    <button class="btn" id="mois-suiv">›</button>
    <button class="btn fantome" id="mois-auj">Ce mois-ci</button>
    {% if utilisateur['role'] == 'admin' %}
    <div class="excel-actions">
      <button class="btn" id="btn-export">↓ Exporter Excel</button>
      <button class="btn" id="btn-import">↑ Importer Excel</button>
      <input type="file" id="fichier-import" accept=".xlsx" style="display:none">
    </div>
    {% endif %}
  </div>

  <div id="planning-info"></div>

  <div class="mois-scroll">
    <div id="planning-mois"></div>
  </div>
</div>

<!-- Modale : choisir le technicien de garde (admin) -->
<div class="overlay" id="modale-garde">
  <div class="modale">
    <div class="tete">
      <div>
        <h3 id="garde-titre">Technicien d'astreinte</h3>
        <div id="garde-sous" style="font-size:13px;color:var(--ardoise);text-transform:capitalize"></div>
      </div>
      <button class="fermer" data-fermer>×</button>
    </div>
    <div class="corps">
      <div class="garde-duree">
        <label>Nombre de jours consécutifs (à partir du jour choisi)</label>
        <div class="duree-ligne">
          <input type="number" id="garde-jours" min="1" max="62" value="1">
          <div class="duree-chips">
            <button type="button" class="chip" data-n="1" onclick="setDuree(1)">1 j</button>
            <button type="button" class="chip" data-n="2" onclick="setDuree(2)">2 j</button>
            <button type="button" class="chip" data-n="3" onclick="setDuree(3)">3 j</button>
            <button type="button" class="chip" data-n="7" onclick="setDuree(7)">7 j</button>
          </div>
        </div>
      </div>
      <div class="garde-choix" id="garde-membres"></div>
    </div>
    <div class="pied">
      <button class="btn danger" onclick="retirerGarde()">Retirer la garde</button>
      <button class="btn fantome" data-fermer>Fermer</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='app.js', v=v) }}"></script>
<script>demarrerPlanning();</script>
{% endblock %}
